<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 992 918" role="img" aria-labelledby="title desc">
  <title id="title">누구도 괜찮지 않은 밤 대표 이미지</title>
  <desc id="desc">모임 이름과 책, 인터뷰 영역을 조합한 회색 톤 대표 이미지</desc>
  <rect width="992" height="918" fill="#696b65"/>
  <g stroke="#111" stroke-width="2" fill="none">
    <path d="M62 0v918M648 0v528M933 0v918M0 109h992M0 528h992M0 804h992M168 528v390"/>
    <path d="M728 109v419"/>
  </g>
  <g fill="#050505" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="94" y="203" font-size="64" font-weight="900">누구도 괜찮지 않은 밤</text>
    <text x="94" y="262" font-size="38" font-weight="500">각자의 밤을 견디는 우리, 서로의</text>
    <text x="94" y="316" font-size="38" font-weight="500">안녕이 되어주는 곳</text>
  </g>
  <g>
    <rect x="648" y="109" width="80" height="419" fill="#1e465f"/>
    <rect x="728" y="109" width="205" height="419" fill="#3d3b64"/>
    <g fill="#98968a" font-family="Georgia, serif" text-anchor="middle">
      <text x="830" y="146" font-size="16" font-weight="700">아무도</text>
      <text x="830" y="173" font-size="16" font-weight="700">지켜보지 않지만</text>
      <text x="830" y="200" font-size="16" font-weight="700">모두가</text>
      <text x="830" y="226" font-size="16" font-weight="700">공연을 한다</text>
      <text x="830" y="385" font-size="21" letter-spacing="7">VIVIAN</text>
      <text x="830" y="414" font-size="21" letter-spacing="7">GORNICK</text>
      <text x="830" y="505" font-size="14" font-weight="700">비비언 고닉</text>
    </g>
    <g fill="#9a988d" font-family="Georgia, serif" text-anchor="middle">
      <text x="681" y="148" font-size="11" writing-mode="tb">누구도 괜찮지 않은 밤</text>
      <text x="681" y="232" font-size="10" writing-mode="tb" letter-spacing="3">APPROVAL JUNKIE</text>
      <text x="681" y="493" font-size="9" writing-mode="tb">책읽는 밤</text>
    </g>
  </g>
  <g>
    <rect x="62" y="528" width="106" height="276" fill="#050505"/>
    <text x="130" y="766" transform="rotate(-90 130 766)" fill="#767772" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="49" font-weight="900">TREVARI</text>
    <rect x="168" y="528" width="274" height="276" fill="#3e3933"/>
    <radialGradient id="portraitGlow" cx="52%" cy="38%" r="58%">
      <stop offset="0" stop-color="#8a8178"/>
      <stop offset="0.55" stop-color="#4a433d"/>
      <stop offset="1" stop-color="#25231f"/>
    </radialGradient>
    <rect x="168" y="528" width="274" height="276" fill="url(#portraitGlow)"/>
    <ellipse cx="304" cy="612" rx="42" ry="58" fill="#161411"/>
    <circle cx="312" cy="604" r="37" fill="#b89b86"/>
    <path d="M259 802c9-84 32-130 72-130s73 50 89 130z" fill="#211a23"/>
    <path d="M275 612c4-51 32-76 71-55 17 10 27 31 22 63-30-23-60-27-93-8z" fill="#111"/>
    <path d="M348 674l39 128h-76z" fill="#ece6dc"/>
    <path d="M344 680l12 122h-27z" fill="#101010"/>
    <rect x="442" y="528" width="491" height="276" fill="#696b65"/>
    <text x="463" y="650" fill="#050505" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="900">'옥상달빛'의 멤버이자</text>
    <text x="463" y="704" fill="#050505" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="900">와우산레코드 대표 김윤주 님</text>
  </g>
  <text x="496" y="481" fill="#fff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="900" text-anchor="middle">종료</text>
</svg>
